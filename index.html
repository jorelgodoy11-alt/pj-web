<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login PJ</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

<body>

<div class="login-box">
    <h2>Patrulla Juvenil</h2>

    <input type="text" id="user" placeholder="Matrícula">
    <input type="password" id="pass" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCtDOHcZSNnfSubKMX8X8bHUNA_QIeKya4",
  authDomain: "patrullas-app.firebaseapp.com",
  databaseURL: "https://patrullas-app-default-rtdb.firebaseio.com/",
  projectId: "patrullas-app",
  storageBucket: "patrullas-app.firebasestorage.app",
  messagingSenderId: "321531166140",
  appId: "1:321531166140:web:200295ca96c51fa53f7fb9"
};


// INICIALIZAR FIREBASE
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


// LOGIN
window.login = async function(){

const user =
document.getElementById("user").value;

const pass =
document.getElementById("pass").value;


// MATRÍCULA → EMAIL
const correo =
user + "@ecoapp.com";

try{

// LOGIN FIREBASE
await signInWithEmailAndPassword(
auth,
correo,
pass
);


// BUSCAR DATOS EN FIRESTORE
const ref =
doc(db, "usuarios", user);

const snap =
await getDoc(ref);


if(snap.exists()){

const datos = snap.data();


// GUARDAR USUARIO ACTUAL
localStorage.setItem(
"usuarioActual",
user
);


// VALIDAR PRIMER INGRESO
if(datos.primerIngreso === true){

window.location.href =
"cambiar.html";

}else{

window.location.href =
"PJ.html";

}

}else{

alert("Usuario no encontrado");

}

}catch(error){

alert("Datos incorrectos");

console.log(error);

}

}

</script>


</body>
</html>
