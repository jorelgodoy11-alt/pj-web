<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login PJ</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Patrulla Juvenil</h2>

    <input type="text" id="user" placeholder="Matrícula">
    <input type="password" id="pass" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
</div>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtDOHcZSNnfSubKMX8X8bHUNA_QIeKya4",
  authDomain: "patrullas-app.firebaseapp.com",
  databaseURL: "https://patrullas-app-default-rtdb.firebaseio.com/",
  projectId: "patrullas-app",
  storageBucket: "patrullas-app.firebasestorage.app",
  messagingSenderId: "321531166140",
  appId: "1:321531166140:web:200295ca96c51fa53f7fb9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
</script>

<script>
function login() {
    const matricula = document.getElementById("user").value.trim();
    const password = document.getElementById("pass").value;

    if(!matricula || !password){
        alert("Ingresa matrícula y contraseña");
        return;
    }

    // Admin local (opcional) si quieres mantener admin "hardcodeado"
    if(matricula === "admin" && password === "admin123"){
        window.location.href = "admin.html";
        return;
    }

    // Email ficticio usando matrícula
    const email = matricula + "@pj.com";

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
        const uid = userCredential.user.uid;

        // Leer datos de usuario desde Realtime Database
        db.ref("usuarios/" + uid).once("value")
        .then(snapshot => {
            const data = snapshot.val();

            if(!data){
                alert("Usuario no encontrado en la base de datos");
                auth.signOut();
                return;
            }

            // Verificamos si es primera vez
            if(data.primeraVez){
                // Redirigir a página para cambiar contraseña
                window.location.href = "cambiar.html?uid=" + uid;
            } else {
                // Redirigir a la página principal del usuario
                window.location.href = "PJ.html";
            }
        });
    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>

</body>
</html>
