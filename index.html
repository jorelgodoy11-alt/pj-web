<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login PJ</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Patrulla Juvenil</h2>

    <input type="text" id="user" placeholder="Matrícula">
    <input type="password" id="pass" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtDOHcZSNnfSubKMX8X8bHUNA_QIeKya4",
  authDomain: "patrullas-app.firebaseapp.com",
  databaseURL: "https://patrullas-app-default-rtdb.firebaseio.com/",
  projectId: "patrullas-app",
  storageBucket: "patrullas-app.firebasestorage.app",
  messagingSenderId: "321531166140",
  appId: "1:321531166140:web:200295ca96c51fa53f7fb9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function login() {
    const userInput = document.getElementById("user").value.trim();
    const passInput = document.getElementById("pass").value;

    if(!userInput || !passInput){
        alert("Llena todos los campos");
        return;
    }

    let email;
    if(userInput === "admin"){
        email = "admin@pj.com";
    } else {
        email = userInput + "@pj.com"; // usuarios normales
    }

    auth.signInWithEmailAndPassword(email, passInput)
    .then(userCredential => {
        const uid = userCredential.user.uid;
        db.ref("usuarios/" + uid).once("value").then(snapshot => {
            const data = snapshot.val();
            if(!data){
                alert("Usuario no existe en Database");
                auth.signOut();
                return;
            }

            if(data.primeraVez){
                window.location.href = `cambiar.html?uid=${uid}`;
            } else if(data.rol === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "PJ.html";
            }
        });
    })
    .catch(err => {
        alert("Usuario o contraseña incorrecta");
        console.error(err);
    });
}
</script>

</body>
</html>
