<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar contraseña</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:250px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

<body>

<div class="login-box">
    <h2>Cambiar contraseña</h2>

    <input type="password" id="nueva" placeholder="Nueva contraseña">
    <button onclick="guardar()">Guardar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
updatePassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {

apiKey: "AIzaSyCtDOHcZSNnfSubKMX8X8bHUNA_QIeKya4",
authDomain: "patrullas-app.firebaseapp.com",
projectId: "patrullas-app",
storageBucket: "patrullas-app.firebasestorage.app",
messagingSenderId: "321531166140",
appId: "1:321531166140:web:200295ca96c51fa53f7fb9"

};


// INICIALIZAR
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


// CAMBIAR CONTRASEÑA
window.guardar = async function(){

const nueva =
document.getElementById("nueva").value;

const user =
localStorage.getItem("usuarioActual");


if(nueva === ""){

alert("Escribe una contraseña");

return;

}


try{

// USUARIO ACTUAL
const usuario = auth.currentUser;


// CAMBIAR PASSWORD
await updatePassword(
usuario,
nueva
);


// ACTUALIZAR FIRESTORE
const ref =
doc(db, "usuarios", user);

await updateDoc(ref, {

primerIngreso: false

});


// LOGIN ACTIVO
localStorage.setItem(
"login",
"true"
);


alert("Contraseña actualizada");

window.location.href =
"PJ.html";


}catch(error){

alert(error.message);

console.log(error);

}

}

</script>

</body>
</html>
