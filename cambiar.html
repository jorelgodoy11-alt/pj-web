<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar contraseña</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:250px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Cambiar contraseña</h2>

    <input type="password" id="nueva" placeholder="Nueva contraseña">
    <button onclick="guardar()">Guardar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtDOHcZSNnfSubKMX8X8bHUNA_QIeKya4",
  authDomain: "patrullas-app.firebaseapp.com",
  databaseURL: "https://patrullas-app-default-rtdb.firebaseio.com/",
  projectId: "patrullas-app",
  storageBucket: "patrullas-app.firebasestorage.app",
  messagingSenderId: "321531166140",
  appId: "1:321531166140:web:200295ca96c51fa53f7fb9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Obtener UID desde la URL
const params = new URLSearchParams(window.location.search);
const uid = params.get('uid');

function guardar(){
    const nueva = document.getElementById("nueva").value.trim();

    if(!nueva){
        alert("Escribe una contraseña");
        return;
    }

    // Re-autenticar el usuario con la contraseña temporal
    const email = uid + "@pj.com"; // email ficticio
    const tempPass = prompt("Ingresa la contraseña temporal para confirmar"); 

    const credential = firebase.auth.EmailAuthProvider.credential(email, tempPass);

    auth.signInWithEmailAndPassword(email, tempPass)
    .then(() => {
        // Cambiar contraseña
        auth.currentUser.updatePassword(nueva)
        .then(() => {
            // Actualizar primeraVez en DB
            db.ref("usuarios/" + uid).update({primeraVez: false})
            .then(() => {
                alert("Contraseña cambiada correctamente");
                window.location.href = "PJ.html";
            });
        })
        .catch(err => alert("Error al cambiar la contraseña: " + err.message));
    })
    .catch(err => alert("Error de autenticación: " + err.message));
}
</script>

</body>
</html>
