<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar contraseña</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:250px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

<body>

<div class="login-box">
    <h2>Cambiar contraseña</h2>

    <input type="password" id="nueva" placeholder="Nueva contraseña">
    <button onclick="guardar()">Guardar</button>
</div>

<script>
function guardar(){
    let nueva = document.getElementById("nueva").value;
    let user = localStorage.getItem("usuarioActual");

    if(nueva === ""){
        alert("Escribe una contraseña");
        return;
    }

    localStorage.setItem(user, nueva);
    localStorage.setItem("login", "true");

    window.location.href = "PJ.html";
}
</script>

</body>
</html>
